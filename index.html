<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyFlow — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">✦</div>
      <h1>StudyFlow</h1>
      <p>Organize seus estudos com clareza</p>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Entrar</button>
        <button class="tab" data-tab="register">Cadastrar</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label for="loginEmail">E-mail</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Senha</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary">Entrar</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="regName">Nome completo</label>
          <input type="text" id="regName" placeholder="Seu nome" required />
        </div>
        <div class="form-group">
          <label for="regEmail">E-mail</label>
          <input type="email" id="regEmail" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label for="regPassword">Senha</label>
          <input type="password" id="regPassword" placeholder="mín. 6 caracteres" required />
        </div>
        <div id="registerError" class="error-msg hidden"></div>
        <div id="registerSuccess" class="success-msg hidden"></div>
        <button type="submit" class="btn-primary">Criar conta</button>
      </form>
    </div>

    <p class="auth-footer">Dados salvos localmente no seu navegador.</p>
  </div>

  <div class="auth-bg">
    <div class="bg-shape s1"></div>
    <div class="bg-shape s2"></div>
    <div class="bg-shape s3"></div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
