<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyFlow — Matérias</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="app-page">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">✦</span>
      <span>StudyFlow</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">◈</span> Dashboard
      </a>
      <a href="tasks.html" class="nav-item">
        <span class="nav-icon">◻</span> Tarefas
      </a>
      <a href="subjects.html" class="nav-item active">
        <span class="nav-icon">◉</span> Matérias
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <p class="user-name" id="userName">—</p>
        <button class="btn-logout" id="logoutBtn">Sair</button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h2>Matérias</h2>
        <p class="header-sub">Organize por área de estudo</p>
      </div>
      <button class="btn-primary" id="openSubjectModalBtn">+ Nova matéria</button>
    </header>

    <div id="subjectsList" class="subjects-grid"></div>
    <div id="emptySubjects" class="empty-state hidden">
      <div class="empty-icon">◉</div>
      <p>Nenhuma matéria cadastrada ainda.</p>
      <button class="btn-secondary" id="emptySubjectBtn">Criar primeira matéria</button>
    </div>
  </main>

  <!-- Modal -->
  <div id="subjectModal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Nova Matéria</h3>
        <button class="modal-close" id="closeSubjectModalBtn">✕</button>
      </div>
      <form id="subjectForm">
        <div class="form-group">
          <label>Nome da matéria *</label>
          <input type="text" id="subjectName" placeholder="Ex: Matemática" required />
        </div>
        <div class="form-group">
          <label>Cor</label>
          <div class="color-picker" id="colorPicker">
            <button type="button" class="color-dot active" data-color="#5B8AF0" style="background:#5B8AF0"></button>
            <button type="button" class="color-dot" data-color="#50C878" style="background:#50C878"></button>
            <button type="button" class="color-dot" data-color="#FF6B6B" style="background:#FF6B6B"></button>
            <button type="button" class="color-dot" data-color="#FFB347" style="background:#FFB347"></button>
            <button type="button" class="color-dot" data-color="#DA70D6" style="background:#DA70D6"></button>
            <button type="button" class="color-dot" data-color="#40E0D0" style="background:#40E0D0"></button>
            <button type="button" class="color-dot" data-color="#FF85A1" style="background:#FF85A1"></button>
            <button type="button" class="color-dot" data-color="#A8D8EA" style="background:#A8D8EA"></button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cancelSubjectBtn">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/subjects.js"></script>
</body>
</html>
