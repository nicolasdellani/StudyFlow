<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyFlow — Tarefas</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="app-page">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">✦</span>
      <span>StudyFlow</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">◈</span> Dashboard
      </a>
      <a href="tasks.html" class="nav-item active">
        <span class="nav-icon">◻</span> Tarefas
      </a>
      <a href="subjects.html" class="nav-item">
        <span class="nav-icon">◉</span> Matérias
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <p class="user-name" id="userName">—</p>
        <button class="btn-logout" id="logoutBtn">Sair</button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h2>Minhas Tarefas</h2>
        <p class="header-sub">Gerencie e organize seus estudos</p>
      </div>
      <button class="btn-primary" id="openModalBtn">+ Nova tarefa</button>
    </header>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">Todas</button>
        <button class="filter-tab" data-filter="pending">Pendentes</button>
        <button class="filter-tab" data-filter="done">Concluídas</button>
      </div>
      <div class="filter-controls">
        <select id="filterSubject">
          <option value="">Todas as matérias</option>
        </select>
        <select id="filterPriority">
          <option value="">Todas as prioridades</option>
          <option value="high">Alta</option>
          <option value="medium">Média</option>
          <option value="low">Baixa</option>
        </select>
      </div>
    </div>

    <!-- Task list -->
    <div id="tasksList" class="tasks-full-list"></div>
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">◻</div>
      <p>Nenhuma tarefa encontrada.</p>
      <button class="btn-secondary" id="emptyAddBtn">Adicionar tarefa</button>
    </div>
  </main>

  <!-- Modal -->
  <div id="taskModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Nova Tarefa</h3>
        <button class="modal-close" id="closeModalBtn">✕</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId" />
        <div class="form-group">
          <label>Título *</label>
          <input type="text" id="taskTitle" placeholder="Ex: Estudar capítulo 5 de Biologia" required />
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="taskDesc" rows="3" placeholder="Detalhes opcionais..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Matéria</label>
            <select id="taskSubject">
              <option value="">Sem matéria</option>
            </select>
          </div>
          <div class="form-group">
            <label>Prioridade</label>
            <select id="taskPriority">
              <option value="low">Baixa</option>
              <option value="medium" selected>Média</option>
              <option value="high">Alta</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Prazo</label>
          <input type="date" id="taskDue" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cancelBtn">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/tasks.js"></script>
</body>
</html>
